<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Padelplan</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="card">

    <!-- HOME -->
    <div id="viewHome" class="view active">
      <h1>Padelplan</h1>
      <p class="muted" style="margin-bottom:14px;">
        Lag et kampoppsett for padel med automatisk trekking og poengføring.
      </p>
      <div class="row">
        <button class="btn big primary" id="goCreateBtn">Opprett sesjon</button>
        <button class="btn big" id="goJoinBtn">Bli med</button>
        <a href="./stats.html" class="btn big">Statistikk</a>
      </div>
    </div>

    <!-- CREATE -->
    <div id="viewCreate" class="view">
      <h1>Opprett sesjon</h1>

      <div style="margin-top:12px;">
        <label for="createPlayers">Spillere (én per linje, minimum 4)</label>
        <textarea id="createPlayers" placeholder="Markus&#10;Partap&#10;Jonas&#10;Erik&#10;..."></textarea>
      </div>

      <div style="margin-top:10px;">
        <label for="createCourts">Antall baner</label>
        <select id="createCourts">
          <option value="1">1 bane</option>
          <option value="2" selected>2 baner</option>
          <option value="3">3 baner</option>
          <option value="4">4 baner</option>
          <option value="5">5 baner</option>
          <option value="6">6 baner</option>
        </select>
      </div>

      <p class="muted" style="margin-top:8px;">
        PIN genereres automatisk. Del den med de andre spillerne slik at de kan bli med.
      </p>

      <div class="row" style="margin-top:14px;">
        <button class="btn" id="createBackBtn">Tilbake</button>
        <button class="btn primary" id="createStartBtn">Opprett og start</button>
      </div>
    </div>

    <!-- JOIN -->
    <div id="viewJoin" class="view">
      <h1>Bli med i sesjon</h1>

      <div style="margin-top:12px;">
        <label for="joinPin">PIN</label>
        <input id="joinPin" type="password" inputmode="numeric" placeholder="123456" style="width:140px;" />
        <p class="muted" style="margin-top:6px;">Skriv inn PIN fra den som opprettet sesjonen.</p>
      </div>

      <div class="row" style="margin-top:14px;">
        <button class="btn" id="joinBackBtn">Tilbake</button>
        <button class="btn primary" id="joinStartBtn">Bli med</button>
      </div>
    </div>

    <!-- LOADING -->
    <div id="viewLoading" class="view">
      <p class="muted">Genererer kampprogram…</p>
    </div>

  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
